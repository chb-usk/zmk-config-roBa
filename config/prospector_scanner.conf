# Kconfig options required to build prospector_scanner on ZMK v0.3-branch.
# The module's own prospector_scanner.conf sets most display/BT options;
# these fill in what is missing for LVGL v8.

# Fonts used by custom_status_screen.c
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_18=y
CONFIG_LV_FONT_MONTSERRAT_20=y
CONFIG_LV_FONT_MONTSERRAT_28=y

# Canvas widget — required by radii_layout.c (wheel drawing)
CONFIG_LV_USE_CANVAS=y

# Arc widget — required by radii_layout.c (battery indicators)
CONFIG_LV_USE_ARC=y

# Image widget — required by radii_layout.c (rotatable wheel image)
CONFIG_LV_USE_IMG=y

# Slider widget — used by custom_status_screen.c (brightness/settings sliders)
CONFIG_LV_USE_SLIDER=y
